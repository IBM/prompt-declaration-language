---
name: Build

on: [push, pull_request]

# cancel any prior runs for this workflow and this PR (or branch)
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    name: static checks / linters
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12', '3.14']

    steps:
    - uses: actions/checkout@v6
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}
    - name: Cache pip
      uses: actions/cache@v5
      with:
        # Cache only pip's download cache (wheels), not the whole Python
        # install. This keeps the cache small to avoid GitHub's per-repo
        # cache size limit and the resulting LRU eviction.
        # This path is specific to Ubuntu.
        path: ~/.cache/pip
        # Look to see if there is a cache hit for the setup file
        key: ${{ runner.os }}-pip-wheels1-${{ env.pythonLocation }}-${{ hashFiles('pyproject.toml') }}
        restore-keys: |
          ${{ runner.os }}-pip-wheels1-${{ env.pythonLocation }}-
          ${{ runner.os }}-pip-wheels1-
    - name: Install dependencies
      run: pip install --upgrade --upgrade-strategy eager .[all]
    - name: pip list packages
      run: pip list
    - name: show pip dependencies
      run: |
        pip install pipdeptree
        pipdeptree -fl
    - name: pre-commit checks
      run: pre-commit run -a
    - name: run tests
      run: py.test -v --capture=tee-sys --ignore=tests/test_examples_run.py --ignore=tests/test_schema.py tests
      if: matrix.python-version == '3.11'
    - name: run tests
      run: py.test -v --capture=tee-sys --ignore=tests/test_examples_run.py tests
      if: matrix.python-version != '3.11'

