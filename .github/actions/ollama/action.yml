name: 'Ollama Setup'
description: 'Composte action for Ollama set up in GH environment'
runs:
  using: 'composite'
  steps:
    - name: Remove unnecessary files
      shell: bash
      run: |
        sudo rm -rf /usr/share/dotnet
        sudo rm -rf "$AGENT_TOOLSDIRECTORY"

    # Cache Ollama models
    - name: Cache Ollama models
      uses: actions/cache@v5
      with:
        path: ~/.ollama
        key: ollama-models-${{ runner.os }}-${{ hashFiles('.github/actions/ollama/action.yml') }}
        restore-keys: |
          ollama-models-${{ runner.os }}-

      # Set up Ollama
    - name: Install Ollama and start server
      shell: bash
      run: |
        curl -fsSL https://ollama.com/install.sh | sudo -E sh

    - name: Wait for Ollama server
      shell: bash
      run: |
        max_attempts=30
        attempt=1
        sleep 15
        
        while [ $attempt -le $max_attempts ]; do
          echo "Attempt $attempt of $max_attempts..."
          if time curl -i http://localhost:11434; then
            echo "✅ Ollama server is ready!"
            exit 0
          else
            echo "❌ Attempt $attempt failed"
            if [ $attempt -lt $max_attempts ]; then
              echo "Retrying in 10 seconds..."
              sleep 10
            fi
          fi
          attempt=$((attempt + 1))
        done
        
        echo "❌ Failed to connect to Ollama server after $max_attempts attempts"

    - name: Pull models in examples/
      shell: bash
      run: |
        models=("granite4:micro" "mxbai-embed-large")
        for model in "${models[@]}"; do
          if ! ollama list | awk 'NR>1 {print $1}' | grep -q "$model"; then
            echo "📥 Pulling model: $model"
            ollama pull "$model"
          else
            echo "✅ Model already available: $model"
          fi
        done
        echo ""
        echo "Available models:"
        ollama list

    - name: Check that all required models are available
      shell: bash
      run: |
        models=("mxbai-embed-large" "granite4:micro")
        missing=0
        for model in "${models[@]}"; do
          if ! ollama list | awk 'NR>1 {print $1}' | grep -q "$model"; then
            echo "❌ Model $model is missing!"
            missing=1
          fi
        done

        if [ "$missing" -eq 1 ]; then
          exit 1
        else
          echo "✅ All expected models are available."
        fi
