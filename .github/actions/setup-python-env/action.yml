name: 'Set up Python environment'
description: 'Set up Python, restore the pip wheel cache, and install PDL with all extras'
inputs:
  python-version:
    description: 'Python version'
    required: true
    default: '3.11'
  runner-os:
    description: 'Runner OS (used in the cache key)'
    required: true
runs:
  using: 'composite'
  steps:
    - name: Set up Python ${{ inputs.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ inputs.python-version }}
    - name: Cache pip
      uses: actions/cache@v5
      with:
        # Cache only pip's download cache (wheels), not the whole Python
        # install. This keeps the cache small to avoid GitHub's per-repo
        # cache size limit and the resulting LRU eviction.
        # This path is specific to Ubuntu.
        path: ~/.cache/pip
        # Look to see if there is a cache hit for the setup file
        key: ${{ inputs.runner-os }}-pip-wheels1-${{ env.pythonLocation }}-${{ hashFiles('pyproject.toml') }}
        restore-keys: |
          ${{ inputs.runner-os }}-pip-wheels1-${{ env.pythonLocation }}-
          ${{ inputs.runner-os }}-pip-wheels1-
    - name: Install dependencies
      shell: bash
      run: pip install --upgrade --upgrade-strategy eager .[all]
